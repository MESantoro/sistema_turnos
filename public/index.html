<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Turnos "V"</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2664/2664627.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .main-card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        thead th { 
            position: sticky; top: 0; background: #e8f5e9 !important; color: #2e7d32; 
            z-index: 10; border-bottom: 2px solid #c8e6c9 !important; padding: 12px 5px !important;
        }
        .bg-franco { background-color: #ffdce0 !important; }
        .input-time-custom { width: 58px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; text-align: center; }
        .input-time-custom:disabled { background: #f0f0f0; border-color: transparent; color: #999; }
        .tm-line, .tt-line { display: flex; gap: 4px; align-items: center; margin-bottom: 3px; justify-content: center; }
        .fecha-header { font-size: 0.7rem; display: block; color: #1b5e20; font-weight: bold; }
        .table-responsive { max-height: 75vh; overflow: auto; }
        .label-franco { font-size: 9px; font-weight: bold; display: block; margin-top: -2px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="main-card">
            <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h4 class="m-0 text-success fw-bold"><i class='bx bxs-calendar-check'></i> GESTIÓN DE TURNOS</h4>
                    <span id="mes-actual" class="fw-bold text-muted"></span>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <input type="date" id="fecha-semana" class="form-control form-control-sm" style="width: 150px;" onchange="actualizarFechas()">
                    <button class="btn btn-outline-dark fw-bold" onclick="exportarExcel()"><i class='bx bxs-file-export'></i> EXCEL</button>
                    <button class="btn btn-success fw-bold" onclick="guardarPlanillaGeneral()">GUARDAR SEMANA</button>
                    <button class="btn btn-primary fw-bold" onclick="modalNuevo()">+ NUEVO</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle m-0 text-center">
                    <thead>
                        <tr id="header-dias">
                            <th style="width: 220px;">Funcionario</th>
                            <th>LU <span class="fecha-header"></span></th>
                            <th>MA <span class="fecha-header"></span></th>
                            <th>MI <span class="fecha-header"></span></th>
                            <th>JU <span class="fecha-header"></span></th>
                            <th>VI <span class="fecha-header"></span></th>
                            <th>SA <span class="fecha-header"></span></th>
                            <th>DO <span class="fecha-header"></span></th>
                            <th>HS TOTAL</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody id="lista-personal"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="turnos.js"></script>
</body>
</html>
